name: Update Instagram Feed Cache

on:
  workflow_dispatch: {}
  schedule:
    # Refresh every 6 hours so the public Instagram cache stays current.
    - cron: "17 */6 * * *"

permissions:
  contents: write

concurrency:
  group: instagram-feed
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout live branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      - name: Update cache
        run: |
          IG_LIMIT=10 python3 scripts/update_instagram_cache.py

      - name: Commit and push to live branch (if changed)
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/instagram_latest.json assets/instagram scripts/update_instagram_cache.py
          git commit -m "chore: refresh Instagram cache"
          git push origin HEAD:gh-pages
