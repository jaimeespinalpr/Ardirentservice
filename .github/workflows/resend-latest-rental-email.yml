name: Resend latest rental email

on:
  workflow_dispatch:

jobs:
  resend:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${HOSTINGER_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Resend latest paid rental emails
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
        run: |
          set -euo pipefail
          SCRIPT="/home/u467534899/domains/ardirentservice.com/public_html/pay/rentals_resend_latest.php"
          ssh -i ~/.ssh/id_ed25519 -p "${HOSTINGER_SSH_PORT:-65002}" \
            -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${HOSTINGER_SSH_USER}@${HOSTINGER_SSH_HOST}" "php '${SCRIPT}'"
