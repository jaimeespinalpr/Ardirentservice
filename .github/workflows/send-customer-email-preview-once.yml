name: Send Customer Email Preview Once

on:
  push:
    paths:
      - '.github/workflows/send-customer-email-preview-once.yml'

jobs:
  send-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH
        env:
          HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${PORT:-65002}" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Send actual customer template to admin inboxes
        env:
          HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          USER: ${{ secrets.HOSTINGER_SSH_USER }}
        run: |
          set -euo pipefail
          PAY_PATH='/home/u467534899/domains/ardirentservice.com/public_html/pay/'
          cat > send_customer_preview.php <<'PHP'
          <?php
          declare(strict_types=1);
          require_once __DIR__ . '/rentals_common.php';
          $recipients = ['ardirentservice@gmail.com', 'jaimeespinalpr@gmail.com'];
          $items = [
              ['item_id' => 'sony-a7-iv', 'title' => 'Sony A7 IV Camera'],
              ['item_id' => 'dji-ronin-rs4', 'title' => 'DJI Ronin RS 4'],
          ];
          foreach ($recipients as $recipient) {
              $reservation = [
                  'id' => 1048,
                  'customer_name' => 'Jaime',
                  'customer_email' => $recipient,
                  'customer_phone' => '(787) 555-0148',
                  'start_date' => '2026-07-18',
                  'end_date' => '2026-07-20',
                  'total_amount_cents' => 22500,
                  'currency' => CURRENCY,
              ];
              if (!rental_send_customer_email($reservation, $items)) {
                  fwrite(STDERR, "Failed to send customer preview to {$recipient}\n");
                  exit(1);
              }
              echo "Customer preview sent to {$recipient}\n";
          }
          PHP
          scp -i ~/.ssh/id_ed25519 -P "${PORT:-65002}" send_customer_preview.php "$USER@$HOST:${PAY_PATH}send_customer_preview.php"
          ssh -i ~/.ssh/id_ed25519 -p "${PORT:-65002}" "$USER@$HOST" "cd '$PAY_PATH' && php send_customer_preview.php; status=\$?; rm -f send_customer_preview.php; exit \$status"