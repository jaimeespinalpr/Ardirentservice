name: Send Email Design Preview Once

on:
  push:
    paths:
      - '.github/workflows/send-email-design-preview-once.yml'

jobs:
  send-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Prepare SSH
        env:
          HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${PORT:-65002}" -H "$HOST" >> ~/.ssh/known_hosts

      - name: Send preview only to administrative recipients
        env:
          HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          USER: ${{ secrets.HOSTINGER_SSH_USER }}
        run: |
          set -euo pipefail
          PAY_PATH='/home/u467534899/domains/ardirentservice.com/public_html/pay/'
          cat > send_design_preview.php <<'PHP'
          <?php
          declare(strict_types=1);
          require_once __DIR__ . '/rentals_common.php';
          $recipients = ['ardirentservice@gmail.com', 'jaimeespinalpr@gmail.com'];
          $subject = '[TEST] Your Ardi rental is confirmed';
          $html = <<<'HTML'
          <!doctype html><html><body style="margin:0;background:#ededed;font-family:Arial,Helvetica,sans-serif;color:#111"><table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#ededed"><tr><td align="center" style="padding:32px 12px"><table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px;background:#fff;border-radius:22px;overflow:hidden"><tr><td align="center" style="background:#050505;padding:30px 24px 28px"><img src="https://www.ardirentservice.com/assets/logos/logo-black-square.png" width="92" alt="Ardi Rent & Service" style="display:block;background:#fff;border-radius:18px;padding:7px"><p style="margin:18px 0 0;color:#cfcfcf;font-size:11px;letter-spacing:2.4px;text-transform:uppercase">Equipment rental confirmation</p></td></tr><tr><td style="padding:34px 34px 10px"><p style="margin:0;color:#151515;font-size:13px;font-weight:bold;letter-spacing:1.2px;text-transform:uppercase">✓ Rental confirmed</p><h1 style="margin:24px 0 12px;font-size:31px;line-height:1.15">Thank you, Jaime!</h1><p style="margin:0;color:#4e4e4e;font-size:16px;line-height:1.65">Your gear is reserved. Now focus on creating something great—we’ll make sure your equipment is ready.</p></td></tr><tr><td style="padding:18px 34px 0"><table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f4f4;border:1px solid #dedede;border-radius:16px"><tr><td colspan="2" style="padding:18px 20px 10px;font-size:12px;color:#666;letter-spacing:1.2px;text-transform:uppercase">Reservation summary · Test data</td></tr><tr><td style="padding:8px 20px;color:#686868;font-size:14px">Confirmation</td><td align="right" style="padding:8px 20px;font-size:14px;font-weight:bold">#1048</td></tr><tr><td style="padding:8px 20px;color:#686868;font-size:14px">Rental dates</td><td align="right" style="padding:8px 20px;font-size:14px;font-weight:bold">July 18–20, 2026</td></tr><tr><td style="padding:8px 20px 20px;color:#686868;font-size:14px">Total paid</td><td align="right" style="padding:8px 20px 20px;font-size:18px;font-weight:bold">$225.00</td></tr></table></td></tr><tr><td style="padding:30px 34px 0"><h2 style="margin:0 0 14px;font-size:18px">Your equipment</h2><p style="border-top:1px solid #e5e5e5;border-bottom:1px solid #e5e5e5;padding:14px 0;margin:0;font-size:15px">Sony A7 IV Camera<br><span style="color:#666;font-size:13px">DJI Ronin RS 4 · Reserved</span></p></td></tr><tr><td style="padding:30px 34px 0"><div style="background:#0b0b0b;border-radius:16px;color:#fff;padding:22px"><h2 style="margin:0 0 8px;font-size:18px">Pickup & return</h2><p style="margin:0;color:#d0d0d0;font-size:14px;line-height:1.65"><strong style="color:#fff">Location:</strong> Park Boulevard condominium<br><strong style="color:#fff">Bring:</strong> A valid ID and this confirmation<br><strong style="color:#fff">Need help?</strong> Reply to this email or contact us on WhatsApp.</p></div></td></tr><tr><td align="center" style="padding:30px 34px 34px"><a href="https://www.ardirentservice.com" style="display:inline-block;background:#111;color:#fff;text-decoration:none;padding:14px 25px;border-radius:999px;font-size:14px;font-weight:bold">Visit Ardi Rent & Service</a><p style="margin:26px 0 6px;font-size:14px;font-weight:bold">Capture the moment. We’ll handle the gear.</p><p style="margin:0;color:#777;font-size:12px">Ardi Rent & Service · Puerto Rico<br>This is a one-time design preview. No customer received this message.</p></td></tr></table></td></tr></table></body></html>
          HTML;
          $message = [
              'subject' => $subject,
              'headers' => [
                  'MIME-Version: 1.0',
                  'From: ' . rental_email_from(),
                  'Reply-To: ' . rental_email_reply_to(),
                  'Content-Type: text/html; charset=UTF-8',
              ],
              'body' => $html,
              'html' => $html,
              'plain' => 'One-time Ardi Rent & Service email design preview.',
          ];
          foreach ($recipients as $recipient) {
              $sent = rental_smtp_configured()
                  ? rental_send_smtp_message($recipient, $message)
                  : mail($recipient, $subject, $html, implode("\r\n", $message['headers']));
              if (!$sent) {
                  fwrite(STDERR, "Failed to send preview to {$recipient}\n");
                  exit(1);
              }
              echo "Preview sent to {$recipient}\n";
          }
          PHP
          scp -i ~/.ssh/id_ed25519 -P "${PORT:-65002}" send_design_preview.php "$USER@$HOST:${PAY_PATH}send_design_preview.php"
          ssh -i ~/.ssh/id_ed25519 -p "${PORT:-65002}" "$USER@$HOST" "cd '$PAY_PATH' && php send_design_preview.php; status=\$?; rm -f send_design_preview.php; exit \$status"