name: Deploy to Hostinger (auto)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-static:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Hostinger secrets
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${HOSTINGER_SSH_HOST}" ]] || missing+=("HOSTINGER_SSH_HOST")
          [[ -n "${HOSTINGER_SSH_PORT}" ]] || missing+=("HOSTINGER_SSH_PORT")
          [[ -n "${HOSTINGER_SSH_USER}" ]] || missing+=("HOSTINGER_SSH_USER")
          [[ -n "${HOSTINGER_SSH_KEY}" ]] || missing+=("HOSTINGER_SSH_KEY")

          if (( ${#missing[@]} > 0 )); then
            echo "Missing GitHub secrets: ${missing[*]}"
            exit 1
          fi

      - name: Prepare SSH
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${HOSTINGER_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Sync static website to Hostinger public_html
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
        run: |
          set -euo pipefail

          STATIC_PATH="/home/u467534899/domains/ardirentservice.com/public_html/"

          rsync -az --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'README.md' \
            --exclude '.DS_Store' \
            --exclude 'deploy-trigger.txt' \
            --exclude 'rentals_*.php' \
            --exclude 'accounts_*.php' \
            --exclude 'lead.php' \
            --exclude 'pay/' \
            --exclude '.env' \
            --exclude '.env.pay' \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${HOSTINGER_SSH_PORT:-65002} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./ "${HOSTINGER_SSH_USER}@${HOSTINGER_SSH_HOST}:${STATIC_PATH}"

  deploy-pay-backend:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy-static

    env:
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      STRIPE_MODE: ${{ secrets.STRIPE_MODE }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      ACCOUNT_BACKEND: ${{ secrets.ACCOUNT_BACKEND }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Stripe, SMTP, and Supabase secrets
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_MODE: ${{ secrets.STRIPE_MODE }}
          RENTAL_SMTP_HOST: ${{ secrets.RENTAL_SMTP_HOST }}
          RENTAL_SMTP_PORT: ${{ secrets.RENTAL_SMTP_PORT }}
          RENTAL_SMTP_USERNAME: ${{ secrets.RENTAL_SMTP_USERNAME }}
          RENTAL_SMTP_PASSWORD: ${{ secrets.RENTAL_SMTP_PASSWORD }}
          RENTAL_SMTP_ENCRYPTION: ${{ secrets.RENTAL_SMTP_ENCRYPTION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ACCOUNT_BACKEND: ${{ secrets.ACCOUNT_BACKEND }}
        run: |
          set -euo pipefail

          missing=()
          for name in \
            STRIPE_SECRET_KEY \
            STRIPE_WEBHOOK_SECRET \
            STRIPE_MODE \
            SUPABASE_URL \
            SUPABASE_PUBLISHABLE_KEY \
            ACCOUNT_BACKEND
          do
            [[ -n "${!name}" ]] || missing+=("${name}")
          done

          supabase_secret="${SUPABASE_SECRET_KEY:-${SUPABASE_SERVICE_ROLE_KEY:-}}"
          [[ -n "${supabase_secret}" ]] || missing+=("SUPABASE_SECRET_KEY|SUPABASE_SERVICE_ROLE_KEY")

          case "${ACCOUNT_BACKEND}" in
            sqlite|supabase) ;;
            *)
              echo "ACCOUNT_BACKEND must be either sqlite or supabase"
              exit 1
              ;;
          esac

          if (( ${#missing[@]} > 0 )); then
            echo "Missing GitHub secrets: ${missing[*]}"
            exit 1
          fi

          mask() {
            if [[ -n "$1" ]]; then
              printf '::add-mask::%s\n' "$1"
            fi
          }

          mask "${STRIPE_SECRET_KEY}"
          mask "${STRIPE_WEBHOOK_SECRET}"
          mask "${RENTAL_SMTP_PASSWORD:-}"
          mask "${SUPABASE_URL}"
          mask "${SUPABASE_PUBLISHABLE_KEY}"
          mask "${supabase_secret}"

      - name: Prepare SSH
        env:
          HOSTINGER_SSH_KEY: ${{ secrets.HOSTINGER_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${HOSTINGER_SSH_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Sync PHP checkout to pay folder
        env:
          HOSTINGER_SSH_HOST: ${{ secrets.HOSTINGER_SSH_HOST }}
          HOSTINGER_SSH_PORT: ${{ secrets.HOSTINGER_SSH_PORT }}
          HOSTINGER_SSH_USER: ${{ secrets.HOSTINGER_SSH_USER }}
          RENTAL_SMTP_HOST: ${{ secrets.RENTAL_SMTP_HOST }}
          RENTAL_SMTP_PORT: ${{ secrets.RENTAL_SMTP_PORT }}
          RENTAL_SMTP_USERNAME: ${{ secrets.RENTAL_SMTP_USERNAME }}
          RENTAL_SMTP_PASSWORD: ${{ secrets.RENTAL_SMTP_PASSWORD }}
          RENTAL_SMTP_ENCRYPTION: ${{ secrets.RENTAL_SMTP_ENCRYPTION }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_PUBLISHABLE_KEY: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ACCOUNT_BACKEND: ${{ secrets.ACCOUNT_BACKEND }}
        run: |
          set -euo pipefail
          PAY_PATH="/home/u467534899/domains/ardirentservice.com/public_html/pay/"
          resolved_supabase_secret="${SUPABASE_SECRET_KEY:-${SUPABASE_SERVICE_ROLE_KEY:-}}"

          ssh -i ~/.ssh/id_ed25519 -p "${HOSTINGER_SSH_PORT:-65002}" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${HOSTINGER_SSH_USER}@${HOSTINGER_SSH_HOST}" \
            "mkdir -p '${PAY_PATH}data' && chmod 755 '${PAY_PATH}data'"

          rsync -az \
            --include 'rentals_availability.php' \
            --include 'rentals_checkout.php' \
            --include 'rentals_common.php' \
            --include 'rentals_confirm.php' \
            --include 'rentals_webhook.php' \
            --include 'rentals_admin.php' \
            --include 'rentals_resend_latest.php' \
            --include 'accounts_common.php' \
            --include 'accounts_api.php' \
            --include 'supabase_common.php' \
            --include 'prints_checkout.php' \
            --include 'data/' \
            --include 'data/prints_metadata.json' \
            --include 'data/.htaccess' \
            --include 'lead.php' \
            --exclude '*' \
            -e "ssh -i ~/.ssh/id_ed25519 -p ${HOSTINGER_SSH_PORT:-65002} -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null" \
            ./ "${HOSTINGER_SSH_USER}@${HOSTINGER_SSH_HOST}:${PAY_PATH}"

          cat > .env.pay <<EOF
          STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
          STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
          STRIPE_MODE=${STRIPE_MODE}
          PUBLIC_SITE_URL=https://www.ardirentservice.com
          PAY_SITE_URL=https://pay.ardirentservice.com
          ALLOWED_ORIGINS=https://ardirentservice.com,https://www.ardirentservice.com
          RENTAL_EMAIL_FROM=Ardi Rent & Service <info@ardirentservice.com>
          RENTAL_EMAIL_REPLY_TO=info@ardirentservice.com
          RENTAL_ADMIN_EMAIL=ardirentservice@gmail.com
          RENTAL_ADMIN_EMAILS=ardirentservice@gmail.com,jaimeespinalpr@gmail.com
          RENTAL_SMTP_HOST=${RENTAL_SMTP_HOST}
          RENTAL_SMTP_PORT=${RENTAL_SMTP_PORT}
          RENTAL_SMTP_USERNAME=${RENTAL_SMTP_USERNAME}
          RENTAL_SMTP_PASSWORD=${RENTAL_SMTP_PASSWORD}
          RENTAL_SMTP_ENCRYPTION=${RENTAL_SMTP_ENCRYPTION}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_PUBLISHABLE_KEY=${SUPABASE_PUBLISHABLE_KEY}
          SUPABASE_SECRET_KEY=${resolved_supabase_secret}
          SUPABASE_SERVICE_ROLE_KEY=${resolved_supabase_secret}
          ACCOUNT_BACKEND=${ACCOUNT_BACKEND}
          RENTAL_PICKUP_ADDRESS=Park Boulevard condominium
          RENTAL_PICKUP_HOURS=Same day, the afternoon before, or by 1:00 p.m. the next day when the rental ends very late.
          RENTAL_PICKUP_CONTACT=Reply to this email or contact Ardi Rent & Service by WhatsApp.
          RENTAL_PICKUP_NOTES=Deliveries and pickups are handled at Park Boulevard. Bring a valid ID and your order confirmation.
          EOF

          scp -i ~/.ssh/id_ed25519 -P "${HOSTINGER_SSH_PORT:-65002}" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            .env.pay "${HOSTINGER_SSH_USER}@${HOSTINGER_SSH_HOST}:${PAY_PATH}.env"

          ssh -i ~/.ssh/id_ed25519 -p "${HOSTINGER_SSH_PORT:-65002}" -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
            "${HOSTINGER_SSH_USER}@${HOSTINGER_SSH_HOST}" \
            "chmod 600 '${PAY_PATH}.env'"
