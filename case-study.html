            context: [
              "Trabajos creativos archivados documentan a Mundo Rad Surf Magazine como canal editorial dentro de la cultura surf local.",
              "Comunicados más recientes de eventos también mencionan a MundoRad entre marcas de apoyo/patrocinio en circuitos de surf, señalando vigencia de marca.",
              "Esta sección se presenta como evidencia de contexto mediático; no como rol directo de organización del evento.",
            ],
            highlightsTitle: "Uso en Contexto de Portafolio",
            highlights: [
              "Refuerza la dimensión editorial y de red de medios en el posicionamiento de Ardi.",
              "Muestra continuidad entre publicación histórica de surf y patrocinios en eventos actuales.",
              "Funciona como tarjeta de contexto para logros vinculados a visibilidad mediática.",
            ],
            sourcesTitle: "Referencias",
          },
          sources: [
            {
              label: "DannyCruz.com: Mundo Rad Magazine Ad for Velauno",
              url: "https://dannycruz.com/2010/06/09/mundo-rad-magazine-ad-velauno/",
            },
            {
              label: "Sol Borincano: Corona Pro Surf Circuit comunicado (mentions MundoRad)",
              url: "https://www.solborincano.com/comunicados/2025/10/20/de-latinoamrica-los-ganadores-del-corona-pro-surf-circuit-39",
            },
          ],
        },
      };

      const fallbackSlug = "wsl-return-2024";
      const getLang = () => {
        const saved = localStorage.getItem("ardi-language");
        if (saved === "es" || saved === "en") return saved;
        return (navigator.language || "").toLowerCase().startsWith("es") ? "es" : "en";
      };

      const setStory = () => {
        const lang = document.documentElement.lang === "es" ? "es" : getLang();
        const params = new URLSearchParams(window.location.search);
        const slug = params.get("slug") || fallbackSlug;
        const entry = storyContent[slug] || storyContent[fallbackSlug];
        const copy = entry[lang] || entry.en;

        const eyebrow = document.getElementById("story-eyebrow");
        const title = document.getElementById("story-title");
        const summary = document.getElementById("story-summary");
        const contextTitle = document.getElementById("story-context-title");
        const context = document.getElementById("story-context");
        const highlightsTitle = document.getElementById("story-highlights-title");
        const highlights = document.getElementById("story-highlights");
        const sourcesTitle = document.getElementById("story-sources-title");
        const sources = document.getElementById("story-sources");

        eyebrow.textContent = copy.eyebrow;
        title.textContent = copy.title;
        summary.textContent = copy.summary;
        contextTitle.textContent = copy.contextTitle;
        context.innerHTML = "";
        copy.context.forEach((paragraph) => {
          const p = document.createElement("p");
          p.textContent = paragraph;
          context.appendChild(p);
        });

        highlightsTitle.textContent = copy.highlightsTitle;
        highlights.innerHTML = "";
        copy.highlights.forEach((line) => {
          const li = document.createElement("li");
          li.textContent = line;
          highlights.appendChild(li);
        });

        sourcesTitle.textContent = copy.sourcesTitle;
        sources.innerHTML = "";
        entry.sources.forEach((source) => {
          const li = document.createElement("li");
          const a = document.createElement("a");
          a.href = source.url;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          a.textContent = source.label;
          li.appendChild(a);
          sources.appendChild(li);
        });
      };

      document.addEventListener("DOMContentLoaded", () => {
        setStory();
        document.querySelectorAll(".lang-button").forEach((button) => {
          button.addEventListener("click", () => {
            window.setTimeout(setStory, 0);
          });
        });
      });
    </script>
    <script src="assets/app.js?v=20260506-restore-state" defer></script>
  </body>
